server:
  host: "0.0.0.0"
  port: 8000

feed:
  url: "https://realtime.gtfs.de/realtime-free.pb"
  refresh_seconds: 30
  http_timeout_seconds: 15

widgets:
  - id: "1"
    title: "Dechbetten/TELIS FINANZ"
    source: "gtfs_rt"
    stop_ids:
      - "122010"  # Dechbetten/TELIS FINANZ Richtung Lilienthalstraße/Dechbetten
      - "36191"   # Dechbetten/TELIS FINANZ Richtung Schwalbenneststraße
    gtfs_lookahead_hours: 24
    max_departures: 8
    show_delay: true
    show_feed_age: true

  - id: "2"
    title: "Bahnhof Prüfening"
    source: "db_iris"
    db_eva_no: "8004983"  # DB/EVA: Regensburg-Prüfening
    direction_contains: ["Regensburg Hbf"]
    db_only_trains: true
    db_use_fchg: true
    db_lookahead_hours: 24
    max_departures: 8
    show_delay: true
    show_feed_age: true

  - id: "3"
    title: "Lilienthalstraße"
    source: "gtfs_rt"
    stop_ids:
      - "641545"  # Lilienthalstraße (Richtung A)
      - "649599"  # Lilienthalstraße (Richtung B)
    gtfs_lookahead_hours: 24
    max_departures: 8
    show_delay: true
    show_feed_age: true

mapping:
  trip_route_map_csv: "/data/trip_route_map.csv"
  reload_every_seconds: 300

